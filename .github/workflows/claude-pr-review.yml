name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    # Skip drafts; they get reviewed once marked ready_for_review.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a PR for `quant_reporter`, a quantitative
            portfolio-analytics library. Read CONTRIBUTING.md first — the two
            non-negotiable rules below override everything else. Post inline
            comments on specific lines and one top-level summary.

            PRIORITISE, in order:

            1. **Look-ahead bias / temporal leakage (highest priority).** Any
               signal, weight schedule, or backtest decision at day d may use
               ONLY data up to d-1. Check that new signals/strategies lag their
               inputs (`.shift(1)`), that rebalance decisions don't peek at the
               current/future bar, and that train/test or walk-forward splits
               don't leak. If a new signal/strategy lacks a causality
               (future-shuffle) property test, ask for one.

            2. **Honest out-of-sample statistics.** Selection and validation must
               use separate splits; never tune against the reported split.
               Multiple-testing deflation (DSR) must stay intact. Flag any change
               that could inflate OOS performance.

            3. **Quantitative/statistical correctness.** Verify metric and
               optimizer math: annualization factors (×252 vs ×√252), Sharpe/
               Sortino/Calmar, VaR/CVaR, drawdown, covariance handling,
               Black-Litterman, PSR/DSR. Call out a wrong formula explicitly with
               the correct one. Do NOT invent bugs — if the math is correct, say so.

            4. **Correctness & edge cases.** NaN / empty / single-asset inputs,
               numerical stability (near-singular covariance, divide-by-zero),
               error handling, silent data fallbacks that change results without
               telling the user.

            5. **Tests & coverage.** New behaviour needs offline tests (use a
               fixture/CSV DataProvider, not live Yahoo). Coverage must stay >= 80%.

            6. **API surface & docs.** SemVer — flag breaking changes. New public
               API needs docstrings; user-facing changes need a CHANGELOG entry.

            Be concrete and cite file:line. Be rigorous but fair: distinguish real
            correctness issues from style nits, and don't pad the review.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
