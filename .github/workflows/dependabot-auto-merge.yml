name: Dependabot auto-merge

# Automatically enables auto-merge on Dependabot PRs. GitHub then merges each
# one ONLY after the required CI checks (ruff + tests on 3.10–3.12) pass, so a
# breaking update can never merge itself. Requires the repo's "Allow auto-merge"
# setting to be on.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
